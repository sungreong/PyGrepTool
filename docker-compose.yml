services:
  app:
    build: .
    working_dir: /app
    network_mode: none
    command: pytest
  sandbox-demo:
    build: .
    working_dir: /app
    network_mode: none
    volumes:
      # Mount only a deliberately safe fixture, never the host project or home directory.
      - ./tests/fixtures/agent_sample_project:/workspace:ro
    command: python examples/sandboxed_navigation.py
  agent-access-demo:
    build: .
    working_dir: /app
    network_mode: none
    command: python examples/agent_access_contract_demo.py
  agent-live-demo:
    # This is intentionally opt-in: an actual model call needs outbound network access.
    profiles: ["live-agent"]
    build:
      context: .
      target: agent-demo
    working_dir: /app
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY must be set in the local environment or .env file}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gpt-4o-mini}
    volumes:
      # The model gets Tool access only to this read-only fixture workspace.
      - ./tests/fixtures/agent_sample_project:/workspace:ro
    entrypoint: ["python", "examples/agent_access_live_demo.py"]
    command: []
