services:
  app:
    build: .
    working_dir: /app
    network_mode: none
    command: pytest
  sandbox-demo:
    build: .
    working_dir: /app
    network_mode: none
    volumes:
      # Mount only a deliberately safe fixture, never the host project or home directory.
      - ./tests/fixtures/agent_sample_project:/workspace:ro
    command: python examples/sandboxed_navigation.py
